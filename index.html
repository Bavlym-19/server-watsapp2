<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيرفر الثاني | عقارات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #2563eb; 
            --s: #10b981; 
            --bg: #f8fafc; 
            --c: #ffffff; 
            --t: #0f172a; 
            --t-muted: #64748b;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --card-hover-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        [data-theme="dark"] { 
            --bg: #0b0f19; 
            --c: #1e293b; 
            --t: #f8fafc; 
            --t-muted: #94a3b8;
            --border: #334155;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            --card-hover-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }
        
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s, transform 0.2s; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: var(--t); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        header { 
            width: 100%; 
            padding: 18px 5%; 
            background: rgba(var(--c), 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        
        .brand-container { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--p); font-size: 1.3rem; }
        .header-actions { display: flex; gap: 10px; }
        
        .container { 
            max-width: 1200px; 
            width: 90%; 
            margin: 50px auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
        }
        
        .card { 
            background: var(--c); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: var(--card-shadow); 
            text-align: center; 
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: var(--card-hover-shadow);
            border-color: var(--p);
        }
        
        .card h3 { margin-top: 0; margin-bottom: 12px; font-weight: 700; font-size: 1.25rem; }
        
        .qr-box { 
            margin: 20px 0; 
            min-height: 220px; 
            background: #f1f5f9; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed #cbd5e1;
        }
        [data-theme="dark"] .qr-box { background: #1e293b; border-color: #475569; }
        .qr-box img { max-width: 180px; border-radius: 8px; }
        
        .badge { 
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            display: inline-block;
        }
        .off { background: #fee2e2; color: #ef4444; }
        [data-theme="dark"] .off { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .on { background: #dcfce7; color: #10b981; }
        [data-theme="dark"] .on { background: rgba(16, 185, 129, 0.15); color: #86efac; }
        .wait { background: #fef3c7; color: #d97706; }
        [data-theme="dark"] .wait { background: rgba(217, 119, 6, 0.15); color: #fde047; }
        
        .btn { 
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            margin-top: 12px; 
            font-family: inherit;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-p { background: var(--p); color: #fff; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-p:hover { background: #1d4ed8; }
        .btn-s { background: transparent; color: var(--p); border: 2px solid var(--p); }
        .btn-s:hover { background: rgba(37, 99, 235, 0.05); }
        
        .btn-action { width: auto; margin: 0; padding: 8px 16px; background: var(--bg); border: 1px solid var(--border); color: var(--t); }
        .btn-action:hover { background: var(--border); }
        
        .pairing { 
            margin-top: 15px; 
            display: none; 
            padding: 15px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .pairing input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            margin-bottom: 8px; 
            text-align: center; 
            font-size: 1rem;
            background: var(--c);
            color: var(--t);
        }
        .pairing input:focus { outline: 2px solid var(--p); }
        
        footer { margin-top: auto; padding: 25px; text-align: center; color: var(--t-muted); font-size: 0.9rem; border-top: 1px solid var(--border); }
        [lang="en"] { direction: ltr; }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="brand-container">
            <i class="fas fa-building"></i> 
            <span data-i18n="brand">السيرفر الأول | عقارات</span>
        </div>
        <div class="header-actions">
            <button onclick="toggleLang()" class="btn btn-action" id="langBtn">EN</button>
            <button onclick="toggleTheme()" class="btn btn-action"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>
    </header>

    <div class="container">
        <div id="session1" class="card">
            <h3 data-i18n="s1">الجلسة الأولى</h3>
            <span id="st1" class="badge off" data-i18n="off">غير متصل</span>
            
            <div id="qr1" class="qr-box">
                <i class="fas fa-qrcode fa-4x" style="color:var(--t-muted); opacity: 0.4;"></i>
            </div>
            
            <div id="pc1" style="font-size:1.6rem; color:var(--s); font-weight:bold; letter-spacing: 2px; margin: 10px 0;"></div>
            
            <button class="btn btn-p" onclick="start('session1', false)">
                <i class="fas fa-scan"></i> <span data-i18n="b1">بدء عبر QR</span>
            </button>
            <button class="btn btn-s" onclick="showP('session1')">
                <i class="fas fa-link"></i> <span data-i18n="b2">كود الربط</span>
            </button>
            
            <div id="f1" class="pairing">
                <input type="text" id="ph1" placeholder="201234567890">
                <button class="btn btn-p" onclick="start('session1', true)" data-i18n="ok">تأكيد</button>
            </div>
        </div>

        <div id="session2" class="card">
            <h3 data-i18n="s2">الجلسة الثانية</h3>
            <span id="st2" class="badge off" data-i18n="off">غير متصل</span>
            
            <div id="qr2" class="qr-box">
                <i class="fas fa-qrcode fa-4x" style="color:var(--t-muted); opacity: 0.4;"></i>
            </div>
            
            <div id="pc2" style="font-size:1.6rem; color:var(--s); font-weight:bold; letter-spacing: 2px; margin: 10px 0;"></div>
            
            <button class="btn btn-p" onclick="start('session2', false)">
                <i class="fas fa-scan"></i> <span data-i18n="b1">بدء عبر QR</span>
            </button>
            <button class="btn btn-s" onclick="showP('session2')">
                <i class="fas fa-link"></i> <span data-i18n="b2">كود الربط</span>
            </button>
            
            <div id="f2" class="pairing">
                <input type="text" id="ph2" placeholder="201234567890">
                <button class="btn btn-p" onclick="start('session2', true)" data-i18n="ok">تأكيد</button>
            </div>
        </div>

        <div id="session3" class="card">
            <h3 data-i18n="s3">الجلسة الثالثة</h3>
            <span id="st3" class="badge off" data-i18n="off">غير متصل</span>
            
            <div id="qr3" class="qr-box">
                <i class="fas fa-qrcode fa-4x" style="color:var(--t-muted); opacity: 0.4;"></i>
            </div>
            
            <div id="pc3" style="font-size:1.6rem; color:var(--s); font-weight:bold; letter-spacing: 2px; margin: 10px 0;"></div>
            
            <button class="btn btn-p" onclick="start('session3', false)">
                <i class="fas fa-scan"></i> <span data-i18n="b1">بدء عبر QR</span>
            </button>
            <button class="btn btn-s" onclick="showP('session3')">
                <i class="fas fa-link"></i> <span data-i18n="b2">كود الربط</span>
            </button>
            
            <div id="f3" class="pairing">
                <input type="text" id="ph3" placeholder="201234567890">
                <button class="btn btn-p" onclick="start('session3', true)" data-i18n="ok">تأكيد</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 السيرفر الثاني للخدمات العقارية. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let lang = 'ar';
        const txt = {
            ar: { brand: "السيرفر الأول | عقارات", off: "غير متصل", wait: "جاري الاتصال...", on: "متصل ✅", b1: "بدء عبر QR", b2: "كود الربط", ok: "تأكيد", s1: "الجلسة الأولى", s2: "الجلسة الثانية", s3: "الجلسة الثالثة" },
            en: { brand: "Server One | Real Estate", off: "Offline", wait: "Connecting...", on: "Connected ✅", b1: "Start via QR", b2: "Pairing Code", ok: "Confirm", s1: "Session 1", s2: "Session 2", s3: "Session 3" }
        };

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = lang === 'ar' ? 'EN' : 'AR';
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = txt[lang][el.dataset.i18n]);
        }

        function toggleTheme() {
            const b = document.body;
            const icon = document.getElementById('themeIcon');
            if(b.dataset.theme === 'light') {
                b.dataset.theme = 'dark';
                icon.className = 'fas fa-sun';
            } else {
                b.dataset.theme = 'light';
                icon.className = 'fas fa-moon';
            }
        }

        function showP(id) {
            const num = id.replace('session', '');
            const f = document.getElementById('f' + num);
            f.style.display = (f.style.display === 'block' || f.style.display === 'webkit-box') ? 'none' : 'block';
        }

        async function start(id, useP) {
            const n = id.replace('session', '');
            const st = document.getElementById('st' + n);
            const ph = document.getElementById('ph' + n).value;
            st.className = 'badge wait'; st.innerText = txt[lang].wait;
            await fetch('/session/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: id, usePairingCode: useP, phoneNumber: ph })
            });
        }

        socket.on("qr", d => {
            const n = d.sessionId.replace('session', '');
            document.getElementById('qr' + n).innerHTML = `<img src="${d.qrImage}" alt="QR Code">`;
            document.getElementById('st' + n).innerText = "Scan QR";
        });

        socket.on("pairing_code", d => {
            const n = d.sessionId.replace('session', '');
            document.getElementById('pc' + n).innerText = d.code;
            document.getElementById('qr' + n).innerHTML = '<i class="fas fa-mobile-alt fa-4x" style="color:var(--p)"></i>';
        });

        socket.on("status", d => {
            const n = d.sessionId.replace('session', '');
            const st = document.getElementById('st' + n);
            if (d.status === "connected") {
                st.className = 'badge on'; st.innerText = txt[lang].on;
                document.getElementById('qr' + n).innerHTML = '<i class="fas fa-check-circle fa-4x" style="color:var(--s)"></i>';
                document.getElementById('pc' + n).innerText = '';
            } else {
                st.className = 'badge off'; st.innerText = txt[lang].off;
                document.getElementById('qr' + n).innerHTML = '<i class="fas fa-qrcode fa-4x" style="color:var(--t-muted); opacity: 0.4;"></i>';
            }
        });
    </script>
</body>
</html>
